# skills_taxonomy v1 — детерминированный baseline для slim_export.skills
#
# Формат:
#   - canonical: <каноничное имя для UI>
#     aliases: [<RU/EN варианты, регистронезависимо>]
#     category: <languages|databases|frameworks_backend|frameworks_frontend|
#                 data|ml|devops|cloud|design|mobile|qa|soft|methodology>
#
# Matcher (src/enrich/skills_match.py): word-boundary regex по каждому
# alias + canonical. Дубли по canonical схлопываются.
#
# Гид по добавлению:
#   - aliases должны быть однозначными (не "go" с word boundary внутри
#     слова "google" — \b защитит). Многословные: "Power BI", "Data Lake".
#   - не добавлять супер-общее ("api", "база") — false positives.
#   - canonical в UI-friendly форме (PostgreSQL, ClickHouse, не postgres/ch).


name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: ruff / mypy / pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.23"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install package + dev extras from lock
        run: uv sync --extra dev --locked

      - name: ruff check
        run: uv run ruff check src tests

      - name: mypy (strict slice — src only, per pyproject.toml)
        run: uv run mypy

      - name: pytest (excludes slow markers)
        # --cov-fail-under=97: local baseline after the 2026-07-06 Neon/Vercel
        # excision is 98.42% (767 tests).
        run: |
          mkdir -p .tmp
          uv run pytest -q -m "not slow" --basetemp=.tmp/pytest-ci \
            --cov=src --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=97

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
